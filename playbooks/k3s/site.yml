---
# k3s cluster bootstrap — full sequence.
#
# Before first run:
#   1. Set token in group_vars/k3s_cluster.yml
#      (generate: openssl rand -base64 64 | tr -d '\n')
#   2. Install collection dependencies:
#      ansible-galaxy collection install -r requirements.yml
#   3. Run:
#      ansible-playbook playbooks/k3s/site.yml --ask-pass --ask-become-pass

# ── Pre-flight additions not covered by k3s-ansible's prereq role ────────────

- name: Homelab pre-flight
  hosts: k3s_cluster
  become: true
  gather_facts: true
  tasks:
    - name: Install nfs-common and curl
      ansible.builtin.apt:
        name:
          - nfs-common
          - curl
        state: present
        update_cache: false

    - name: Install open-iscsi (x86 only)
      ansible.builtin.apt:
        name: open-iscsi
        state: present
        update_cache: false
      when: ansible_architecture == 'x86_64'

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: true

    - name: Persist swap-off in /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#\s]\S+\s+\S+\s+swap\s+.*)$'
        replace: '# \1'

# ── k3s-ansible: prereqs, Pi cgroup fix, server + agent install, kubeconfig ──

- import_playbook: ../../vendor/k3s-ansible/playbooks/site.yml

# ── Custom: apply homelab node-role labels (not in k3s-ansible) ──────────────

- import_playbook: labels.yml
