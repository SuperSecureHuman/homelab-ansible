---
- name: Upgrade and update all cluster nodes
  hosts: cluster
  become: true

  tasks:
    # - name: Wait for apt lock to be released
    #   ansible.builtin.wait_for:
    #     path: "{{ item }}"
    #     state: absent
    #     timeout: 120
    #   loop:
    #     - /var/lib/dpkg/lock-frontend
    #     - /var/lib/apt/lists/lock
    #     - /var/cache/apt/archives/lock

    - name: Fix broken package installs
      ansible.builtin.command: apt-get install -f -y
      changed_when: false

    - name: Fix any interrupted dpkg operations
      ansible.builtin.command: dpkg --configure -a
      changed_when: false

    - name: Update apt cache and dist-upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 0

    - name: Remove unused packages
      ansible.builtin.apt:
        autoremove: true
        purge: true

    - name: Clean apt cache
      ansible.builtin.apt:
        autoclean: true

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_flag

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: reboot_flag.stat.exists
