services:

  unbound:
    image: mvance/unbound:latest
    network_mode: host
    volumes:
      - ./unbound:/opt/unbound/etc/unbound:ro
    restart: unless-stopped

  pihole:
    image: pihole/pihole:latest
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    environment:
      TZ: ${TZ:-Asia/Kolkata}
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_dns_listeningMode: ALL
      FTLCONF_webserver_port: 25080
      FTLCONF_dns_upstreams: "127.0.0.1#5335"
    volumes:
      - ./data/pihole:/etc/pihole
    restart: unless-stopped
    depends_on:
      - unbound

  keepalived:
    image: osixia/keepalived:2.3
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BROADCAST
    environment:
      KEEPALIVED_CONF: /etc/keepalived/keepalived.conf
    volumes:
      - ./keepalived/keepalived.conf:/etc/keepalived/keepalived.conf:ro
      - ./keepalived/check_pihole.sh:/check_pihole.sh:ro
    restart: unless-stopped
    depends_on:
      - pihole

  pihole-exporter:
    image: ekofr/pihole-exporter:latest
    network_mode: host
    environment:
      PIHOLE_HOSTNAME: "127.0.0.1"
      PIHOLE_PASSWORD: ${PIHOLE_PASSWORD}
      PIHOLE_PROTOCOL: http
      PIHOLE_PORT: 25080
      PORT: 9617
    restart: unless-stopped
    depends_on:
      - pihole

  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    profiles: ["primary"]
    environment:
      PRIMARY: "http://192.168.0.180:25080|${PIHOLE_PASSWORD}"
      REPLICAS: "http://192.168.0.104:25080|${PIHOLE_PASSWORD},http://192.168.0.105:25080|${PIHOLE_PASSWORD},http://192.168.0.202:25080|${PIHOLE_PASSWORD},http://192.168.0.201:25080|${PIHOLE_PASSWORD},http://192.168.0.203:25080|${PIHOLE_PASSWORD},http://192.168.0.204:25080|${PIHOLE_PASSWORD}"
      FULL_SYNC: "true"
      RUN_GRAVITY: "true"
      CRON: "0 * * * *"
    restart: unless-stopped
